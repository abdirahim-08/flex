<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>checkout page</title>
</head>
<body>
  <main class="checkout">
    <section class="checkout__billing">
      <h2 class="checkout__billing--title">Checkuot</h2>
      <p class="checkout__billing--para">There are three products in your cart</p>

      <form class="checkout__billing--form">
        <h3 class="checkout__billing--form--title">Billing details</h3>

        <fieldset class="checkout__billing--form--name">
          <input type="text" placeholder="First Name*">
          <input type="text" placeholder="Last Name*">
        </fieldset>

        <fieldset class="checkout__billing--form__address">
          <input type="text" placeholder="Address*">
          <input type="text" placeholder="Address line 2">
        </fieldset>

        <fielset class="checkout__billing--form__country">
          <select name="country" id="country">
            <option>country</option>
            <option>Australia</option>
            <option>Germany</option>
            <option>Sweden</option>
            <option>Liechtenstein</option>
          </select>

          <input type="text" placeholder="city/Town">
        </fielset>

        <fieldset class="checkout__billing--form__zipcode">
          <input type="text" placeholder="Postcode/Zip*">
          <input type="text" placeholder="Phone*">
        </fieldset>

        <textarea name="info" 
        id="info" cols="30" 
        rows="10" 
        placeholder="Additional Information">
        </textarea>

        <fieldset class="checkout__billing--form__account">
          <label for="account">Create Account</label>
          <input type="Checkbox">
        </fieldset>

        <fieldset class="checkout__billing--form__shipment">
          <label for="shipment">Ship to a different address</label>
          <input type="Checkbox">
        </fieldset>

        
      </form>
    </section>
  </main>
</body>
</html>
